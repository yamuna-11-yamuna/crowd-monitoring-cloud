<!DOCTYPE html>
<html>
<head>
<title>Smart Crowd Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI';
    background: #0f172a;
    color: white;
    display: flex;
}

.sidebar {
    width: 220px;
    background: #020617;
    padding: 20px;
}

.nav-item {
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    cursor: pointer;
}

.nav-item:hover { background: #1e293b; }
.active { background: #22c55e; }

.main { flex: 1; padding: 20px; }

.section { display: none; }
.section.active-section { display: block; }

.cards {
    display: flex;
    gap: 20px;
    margin-top: 20px;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
    flex: 1;
    text-align: center;
}

.value {
    font-size: 28px;
    font-weight: bold;
}

button {
    padding: 10px 20px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
}

.start { background: green; color: white; }
.stop { background: red; color: white; }

.chart-box, .heatmap {
    margin-top: 30px;
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
}
</style>
</head>

<body>

<div class="sidebar">
    <h2>🚀 Crowd AI</h2>

    <div class="nav-item active" onclick="showSection(event,'dashboard')">Dashboard</div>
    <div class="nav-item" onclick="showSection(event,'analytics')">Analytics</div>
    <div class="nav-item" onclick="showSection(event,'reports')">Reports</div>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboard" class="section active-section">

<h1>Smart Crowd Monitoring</h1>

<button class="start" onclick="startSystem()">Start</button>
<button class="stop" onclick="stopSystem()">Stop</button>

<div id="status">Status: Stopped</div>

<div class="cards">
    <div class="card"><h3>Level</h3><div id="level" class="value">--</div></div>
    <div class="card"><h3>Prediction</h3><div id="prediction" class="value">--</div></div>
    <div class="card"><h3>People</h3><div id="people" class="value">--</div></div>
</div>

<div class="chart-box">
    <canvas id="chart"></canvas>
</div>

<div class="heatmap">
    <h3>🔥 Heatmap</h3>
    <!-- ✅ FIXED -->
    <img id="heatmap" src="/static/heatmap.jpg" width="500">
</div>

</div>

<!-- ANALYTICS -->
<div id="analytics" class="section">
    <h1>📊 Analytics</h1>

    <div class="cards">
        <div class="card"><h3>Average Crowd</h3><div id="avg" class="value">--</div></div>
        <div class="card"><h3>Max Crowd</h3><div id="max" class="value">--</div></div>
        <div class="card"><h3>Min Crowd</h3><div id="min" class="value">--</div></div>
    </div>

    <div class="chart-box">
        <canvas id="analyticsChart"></canvas>
    </div>
</div>

<!-- REPORTS -->
<div id="reports" class="section">
    <h1>📁 Reports</h1>

    <button onclick="downloadCSV()">⬇ Download CSV</button>

    <table border="1" style="margin-top:20px; width:100%; color:white;">
        <thead>
            <tr><th>Frame</th><th>Crowd Count</th></tr>
        </thead>
        <tbody id="reportTable"></tbody>
    </table>
</div>

</div>

<script>

let chart;
let analyticsChart;

/* START */
function startSystem() {
    fetch("/start");
    document.getElementById("status").innerText = "Status: Running";
}

/* STOP */
function stopSystem() {
    fetch("/stop");
    document.getElementById("status").innerText = "Status: Stopped";
}

/* SIDEBAR SWITCH */
function showSection(e, sectionId) {
    document.querySelectorAll(".section").forEach(sec => {
        sec.classList.remove("active-section");
    });

    document.getElementById(sectionId).classList.add("active-section");

    document.querySelectorAll(".nav-item").forEach(item => {
        item.classList.remove("active");
    });

    e.target.classList.add("active");
}

/* FETCH DATA */
function fetchData() {
    fetch("/data")
    .then(res => res.json())
    .then(res => {

        let data = res.data;
        let prediction = res.prediction;

        if (!data || data.length === 0) return;

        let counts = data.map(d => d["Crowd Count"]);
        let frames = data.map(d => d.Frame);

        let avg = counts.reduce((a,b)=>a+b,0)/counts.length;

        let level = avg > 20 ? "HIGH" : avg > 10 ? "MEDIUM" : "LOW";

        document.getElementById("level").innerText = level;
        document.getElementById("prediction").innerText = prediction;
        document.getElementById("people").innerText = counts[counts.length-1];

        if (chart) chart.destroy();
        chart = new Chart(document.getElementById("chart"), {
            type: "line",
            data: {
                labels: frames,
                datasets: [{ label: "Crowd Count", data: counts }]
            }
        });

        // Analytics
        document.getElementById("avg").innerText = avg.toFixed(2);
        document.getElementById("max").innerText = Math.max(...counts);
        document.getElementById("min").innerText = Math.min(...counts);

        if (analyticsChart) analyticsChart.destroy();
        analyticsChart = new Chart(document.getElementById("analyticsChart"), {
            type: "bar",
            data: {
                labels: frames,
                datasets: [{ label: "Crowd Count", data: counts }]
            }
        });

        // Reports
        let table = document.getElementById("reportTable");
        table.innerHTML = "";
        data.forEach(d => {
            table.innerHTML += `<tr>
                <td>${d.Frame}</td>
                <td>${d["Crowd Count"]}</td>
            </tr>`;
        });

        // ✅ FIXED HEATMAP REFRESH
        document.getElementById("heatmap").src =
            "/static/heatmap.jpg?t=" + new Date().getTime();
    });
}

/* ✅ FIXED DOWNLOAD */
function downloadCSV() {
    window.location.href = "/download";
}

/* AUTO REFRESH */
setInterval(fetchData, 2000);

</script>

</body>
</html>
