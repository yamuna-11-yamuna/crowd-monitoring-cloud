<!DOCTYPE html>
<html>
<head>
<title>Smart Crowd Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI';
    background: linear-gradient(135deg,#020617,#0f172a);
    color: white;
    display: flex;
}

/* SIDEBAR */
.sidebar {
    width: 220px;
    background: #020617;
    padding: 20px;
}

.nav-item {
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    cursor: pointer;
}

.nav-item:hover { background: #1e293b; }
.active { background: #22c55e; }

/* MAIN */
.main { flex: 1; padding: 20px; }

.section { display: none; }
.section.active-section { display: block; }

/* CARDS */
.cards {
    display: flex;
    gap: 20px;
    margin-top: 20px;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
    flex: 1;
    text-align: center;
    box-shadow: 0 0 15px rgba(34,197,94,0.3);
}

.card:hover {
    transform: scale(1.05);
    transition: 0.3s;
}

.value {
    font-size: 28px;
    font-weight: bold;
}

/* BUTTONS */
button {
    padding: 10px 20px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
}

.start { background: green; color: white; }
.stop { background: red; color: white; }

.chart-box, .heatmap {
    margin-top: 30px;
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>🚀 Crowd AI</h2>

    <div class="nav-item active" onclick="showSection(event,'dashboard')">Dashboard</div>
    <div class="nav-item" onclick="showSection(event,'analytics')">Analytics</div>
    <div class="nav-item" onclick="showSection(event,'reports')">Reports</div>
</div>

<!-- MAIN -->
<div class="main">

<!-- DASHBOARD -->
<div id="dashboard" class="section active-section">

<h1>Smart Crowd Monitoring</h1>

<button class="start" onclick="startSystem()">Start</button>
<button class="stop" onclick="stopSystem()">Stop</button>

<div id="status">Status: Stopped</div>

<div class="cards">
    <div class="card"><h3>Level</h3><div id="level" class="value">--</div></div>
    <div class="card"><h3>Prediction</h3><div id="prediction" class="value">--</div></div>
    <div class="card"><h3>People</h3><div id="people" class="value">--</div></div>
</div>

<div class="chart-box">
    <canvas id="chart"></canvas>
</div>

<div class="heatmap">
    <h3>🔥 Heatmap</h3>
    <img id="heatmap" src="/static/heatmap.jpg" width="500">
</div>

</div>

<!-- ANALYTICS -->
<div id="analytics" class="section">
<h1>📊 Analytics</h1>

<div class="cards">
    <div class="card"><h3>Average</h3><div id="avg" class="value">--</div></div>
    <div class="card"><h3>Max</h3><div id="max" class="value">--</div></div>
    <div class="card"><h3>Min</h3><div id="min" class="value">--</div></div>
</div>

<canvas id="analyticsChart"></canvas>
</div>

<!-- REPORTS -->
<div id="reports" class="section">
<h1>📁 Reports</h1>

<button onclick="downloadCSV()">Download CSV</button>

<table border="1" style="width:100%; margin-top:20px;">
<thead>
<tr><th>Frame</th><th>Count</th></tr>
</thead>
<tbody id="reportTable"></tbody>
</table>

</div>

</div>

<script>

let chart, analyticsChart;

/* SIDEBAR */
function showSection(e,id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active-section"));
document.getElementById(id).classList.add("active-section");

document.querySelectorAll(".nav-item").forEach(n=>n.classList.remove("active"));
e.target.classList.add("active");
}

/* START STOP */
function startSystem(){ fetch("/start"); document.getElementById("status").innerText="Running"; }
function stopSystem(){ fetch("/stop"); document.getElementById("status").innerText="Stopped"; }

/* FETCH */
function fetchData(){
fetch("/data").then(r=>r.json()).then(res=>{

let data=res.data;
let pred=res.prediction;
if(!data.length) return;

let counts=data.map(d=>d["Crowd Count"]);
let frames=data.map(d=>d.Frame);

let avg=counts.reduce((a,b)=>a+b,0)/counts.length;
let level=avg>20?"HIGH":avg>10?"MEDIUM":"LOW";

document.getElementById("level").innerText=level;
document.getElementById("prediction").innerText=pred;
document.getElementById("people").innerText=counts.at(-1);

/* MAIN GRAPH */
if(chart) chart.destroy();
chart=new Chart(document.getElementById("chart"),{
type:"line",
data:{labels:frames,datasets:[{label:"Crowd",data:counts}]}
});

/* ANALYTICS */
document.getElementById("avg").innerText=avg.toFixed(2);
document.getElementById("max").innerText=Math.max(...counts);
document.getElementById("min").innerText=Math.min(...counts);

if(analyticsChart) analyticsChart.destroy();
analyticsChart=new Chart(document.getElementById("analyticsChart"),{
type:"bar",
data:{labels:frames,datasets:[{label:"Crowd",data:counts}]}
});

/* REPORT */
let table=document.getElementById("reportTable");
table.innerHTML="";
data.forEach(d=>{
table.innerHTML+=`<tr><td>${d.Frame}</td><td>${d["Crowd Count"]}</td></tr>`;
});

/* HEATMAP REFRESH */
document.getElementById("heatmap").src="/static/heatmap.jpg?t="+Date.now();

});
}

function downloadCSV(){
window.location.href="/download";
}

setInterval(fetchData,2000);

</script>

</body>
</html>
